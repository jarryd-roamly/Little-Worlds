name: little_worlds
description: A warm, text-free play world for kids 3-8. V1 - Home & Family, Scene 1.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.0   # local save (progress tree, settings)
  audioplayers: ^6.0.0         # sound effects & VO
  vibration: ^2.0.0            # gentle haptics

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
